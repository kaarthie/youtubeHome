<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Position Absolute</title>
    <style>
        .closeButton {
            width: 25px;
            height: 25px;
            display: flex;
            border-radius: 15px;
            justify-content: center;
            align-items: center;
            color: white;
            background-color: black;
            position: absolute;
            right: 10px;
            top: 10px;
        }
        body {
            height: 2000px;
        }
        .tab{
            width: 200px;
            height: 100px;
            background-color: grey;
            position: fixed;
            bottom: 10px;
            right: 10px;
            .closeButton{
                left: -10px;
                top: -10px;
            }
        }
        .timeStamp {
            position: absolute;
            right: 5px;
            bottom: 5px;
            background-color: black;
            color: white;
            font-size: 12px;
            padding-left: 3px;
            padding-right: 3px;
        }
    </style>
</head>
<body>
    <div class="closeButton">X</div>
    <div class="tab">
        <div class="closeButton">X</div>
        <div class="timeStamp">0:29</div>
    </div>
</body>
</html>
