<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex 5</title>
    <style>
        body {
            font-family: roboto, arial;
        }

        .main {
            display: flex;
            flex-direction: row;
            column-gap: 10px;
            align-items: start;
            padding: 10px;

            .c1 {
                width: 70px;
                height: 70px;

                img {
                    border-radius: 35px;
                    width: 100%;
                    height: 100%;
                    object-fit: cover;
                }
            }

            .c2 {
                flex: 1;
                display: flex;
                width: 300px;
                flex-direction: column;
                row-gap: 10px;

                .questionInfo {
                    display: flex;
                    flex-direction: column;
                    row-gap: 10px;

                    .questionTitle {
                        font-weight: bold;

                        span {
                            color: grey;
                        }
                    }
                }

                .videoInfo {
                    height: 95px;
                    margin-right: 20px;
                    border-radius: 10px;
                    background-color: rgb(223, 222, 222);
                    border: rgb(204, 202, 202) 1px solid;
                    display: flex;
                    flex-direction: row;

                    .videoEmptyDiv {
                        width: 140px;

                    }

                    .videoName {
                        display: flex;
                        flex-direction: column;
                        row-gap: 7px;
                        padding: 15px;
                        width: 100%;
                        border-top-right-radius: 10px;
                        border-bottom-right-radius: 10px;
                        background-color: white;

                        .platform {
                            color: grey;
                        }
                    }
                }
            }
        }
    </style>

</head>

<body>
    <div class="main" style="box-shadow: 0px 0px 6px rgb(199, 199, 199); width: 450px;height: 200px;">
        <div class="c1">
            <img src="images/cat.jpg" alt="">
        </div>
        <div class="c2">
            <div class="questionInfo">
                <div class="questionTitle">supersimple.dev <span>@SuperSimpleDev</span></div>
                <div class="questionL1">What is backend web development? A complete overview. New video is up!</div>
            </div>
            <div class="videoInfo">
                <div class="videoEmptyDiv"></div>
                <div class="videoName">
                    <div class="platform">youtube.com</div>
                    <div>Backend web development - a complete overview (2021)</div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
