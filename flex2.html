<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex 2</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            font-size: 15px;
        }

        .f1 {
            width: 300px;
            height: 80px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            border: grey solid 1px;
            padding: 10px;

            .l1,
            .l2,
            .l3 {
                display: flex;
                flex-direction: row;
                justify-content: space-between;
                padding-left: 10px;
                padding-right: 10px;
            }

            .num {
                color: white;
                border-radius: 55px;
                font-weight: 600;
                padding: 10px;
                padding-top: 1px;
                padding-bottom: 1px;
                background-color: #416CED;
            }
        }

        .f2 {
            background-color: blueviolet;
            display: flex;
            padding: 10px;
            /* width: 600px; */
            flex-direction: row;

            .left {
                width: 100px;
                color: white;
                font-weight: 600;
            }

            .middle {
                flex: 1;
                display: flex;
                flex-direction: row;

                .search {
                    flex: 1;
                    margin-right: 70px;
                    border-radius: 10px;
                    border: none;
                    padding-left: 15px;
                    outline: none;
                    max-width: 500px;
                    box-shadow: 0px 0px 6px grey;
                }
            }

            .right {
                width: px;

                .download {
                    padding: 3px;
                    padding-left: 10px;
                    padding-right: 10px;
                    border: white 1px solid;
                    color: white;
                    background-color: blueviolet;
                }
            }
        }

        .f3 {
            display: flex;
            flex-direction: column;
            row-gap: 20px;
            width: 300px;
            padding: 10px;
            border: grey solid 1px;
            border: solid grey 1px;

            .l1,
            .l2,
            .l3 {
                display: flex;
                flex-direction: row;
                align-items: center;
                .catImage {
                    width: 50px;
                    height: 50px;
                }
                .catInfo {
                    flex: 1;
                    margin-left: 10px;
                    .catName{
                        font-weight: bold;
                        margin-bottom: 5px;
                    }
                    .catDescription, .catType {
                        color: grey;
                    }
                }
                .follow {
                    background-color: #3F94F0;
                    border: none;
                    padding: 5px;
                    padding-top: 3px;
                    padding-bottom: 3px;
                    font-weight: 600;
                    color: white;
                    border-radius:4px;
                }
            }

            img {
                object-fit: cover;
                width: 100%;
                height: 100%;
                border-radius: 30px;
            }
        }
    </style>
</head>

<body>
    <div class="f1">
        <div class="l1">
            <div class="home">Home</div>
            <div class="num">14</div>
        </div>
        <div class="l2">
            <div class="notifications">Notifications</div>
            <div class="num">3</div>
        </div>
        <div class="l3">
            <div class="messages">Messages</div>
            <div class="num">5</div>
        </div>
    </div>
    <hr>
    <div class="f2">
        <div class="left">Home</div>
        <div class="middle">
            <input type="text" class="search" placeholder="Search">
        </div>
        <div class="right">
            <button class="download">Download</button>
        </div>
    </div>
    <hr>
    <div class="f3">
        <div class="l1">
            <div class="catImage"><img src="images/cat.jpg" alt=""></div>
            <div class="catInfo">
                <div class="catName">Oliver</div>
                <div class="catDescription">Sleepy cat</div>
                <div class="catType">Popular</div>
            </div>
            <div class="follow">
                <button class="follow">Follow</button>
            </div>
        </div>
        <div class="l2">
            <div class="catImage"><img src="images/cat.jpg" alt=""></div>
            <div class="catInfo">
                <div class="catName">Oliver</div>
                <div class="catDescription">the cat</div>
                <div class="catType">Popular</div>
            </div>
            <div class="follow">
                <button class="follow">Follow</button>

            </div>
        </div>
        <div class="l3">
            <div class="catImage"><img src="images/cat.jpg" alt=""></div>
            <div class="catInfo">
                <div class="catName">Oliver</div>
                <div class="catDescription">Happy bulldog</div>
                <div class="catType">Popular</div>
            </div>
            <div class="follow">
                <button class="follow">Follow</button>
            </div>
        </div>
    </div>
</body>

</html>
