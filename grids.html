<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grids</title>
    <style>
        .blue {
            background-color: rgb(106, 241, 199);
        }

        .pink {
            background-color: #f15779;
        }

        .grid1 {
            display: grid;
            grid-template-columns: 200px 75px;
        }

        .grid2 {
            display: grid;
            grid-template-columns: 50px 1fr 75px;
        }

        .grid3 {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            column-gap: 20px;
            row-gap: 10px;
        }
    </style>
</head>

<body>
    <div class="grid1">
        <div class="blue">200px</div>
        <div class="pink">75px</div>
    </div>
    <hr>
    <div class="grid2">
        <div class="blue">col1</div>
        <div class="pink">col2</div>
        <div class="blue">col3</div>
    </div>
    <hr>
    <div class="grid3">
        <div class="blue">col1</div>
        <div class="blue">col2</div>
        <div class="blue">col3</div>
        <div class="blue">col4</div>
        <div class="blue">col5</div>
        <div class="blue">col6</div>
        <div class="blue">col7</div>
        <div class="blue">col8</div>
    </div>
    <hr>
</body>

</html>
