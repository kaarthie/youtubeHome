<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Flexbox Layout</title>
    <style>
        .container {
            display: flex;
            flex-wrap: wrap;
        }
        
        .container > div {
            flex: 1 0 21%; /* Approximately 25% width per div to allow space for margin/padding */
            margin: 1%;
            box-sizing: border-box;
            border: 1px solid #000;
            padding: 10px;
            text-align: center;
        }

        @media (max-width: 1200px) {
            .container > div {
                flex: 1 0 45%; /* Approximately 50% width per div to allow space for margin/padding */
            }
        }

        @media (max-width: 768px) {
            .container > div {
                flex: 1 0 45%; /* Approximately 50% width per div to allow space for margin/padding */
            }
        }

        @media (max-width: 480px) {
            .container > div {
                flex: 1 0 96%; /* Approximately 100% width per div to allow space for margin/padding */
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div>Item 1</div>
        <div>Item 2</div>
        <div>Item 3</div>
        <div>Item 4</div>
        <div>Item 5</div>
        <div>Item 6</div>
        <div>Item 7</div>
        <div>Item 8</div>
    </div>
</body>
</html>
