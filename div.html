<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Div</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
        }
        .square {
            width: 40px;
            height: 40px;
            background-color: red;
        }
        .circle{
            width: 40px;
            height: 40px;
            background-color: green;
            border-radius: 20px;
        }
        .wrap1{
            display: inline-block;
            box-shadow: 0px 0px 2px 0.1px;
            padding: 10px;
            padding-right: 40px;
        }

        .youtubeMusic {
            color: white;
            background-color: rgb(54, 51, 51);
            display: inline-block;
            width: 320px;
            padding: 10px;
            padding-top: 5px;
            padding-bottom: 5px;
        }
        .install{
            font-weight: 600;
            font-size: 17px;
        }

        .description {
            font-size: 14px;
        }

    </style>
</head>
<body>
    <div class="square"></div>
    <hr>
    <div class="circle"></div>
    <hr>
    <div class="wrap1">
        <p>Satisfied with our service?</p>
        <button>Yes</button>
        <button>No</button>
    </div>
    <hr>
    <div class="youtubeMusic">
        <p class="install">Install Youtube Music</p>
        <p class="description">Add YouTube Music to your desktop for quick and easy access</p>
    </div>
</body>
</html>
